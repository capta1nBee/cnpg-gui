spring.application.name=backend
server.port=8080

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cloudnativepg_gui}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# JWT Settings
jwt.secret=${JWT_SECRET:8923487f98234yhf9823yrf9823yhf98234yf8293yfh8923yfh8234yf9834yf9834fy}
jwt.expiration-ms=${JWT_EXPIRY_MS:3600000}

# Application defaults
superadmin.user=${SUPERADMIN_USER:admin}
superadmin.password=${SUPERADMIN_PASSWORD:admin}
query.timeout-ms=${QUERY_TIMEOUT_MS:60000}
query.max-rows=${MAX_QUERY_ROWS:5000}
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
