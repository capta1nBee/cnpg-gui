apiVersion: v1
kind: ConfigMap
metadata:
  name: cnpg-gui-config
  namespace: poyraz-system
data:
  # PostgreSQL Database Variables
  POSTGRES_DB: cloudnativepg_gui
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres_secure_password

  # Backend App Variables
  DB_URL: jdbc:postgresql://cnpg-gui-db:5432/cloudnativepg_gui
  DB_USER: postgres
  DB_PASSWORD: postgres_secure_password
  JWT_SECRET: your_very_long_random_secure_jwt_secret_key_1234567890
  JWT_EXPIRY_MS: "3600000"
  SUPERADMIN_USER: admin
  SUPERADMIN_PASSWORD: admin123
  CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:3000,http://cnpg.poyraz.com,https://cnpg.poyraz.com
